<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokemon 卡牌查詢 Debug 版</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f6f6;
      color: #222;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }
    .panel {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 18px;
    }
    h1, h2, h3 {
      margin-top: 0;
    }
    .modes, .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }
    button {
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #bbb;
      cursor: pointer;
      background: #fff;
    }
    button.active, .primary {
      background: #136d75;
      color: #fff;
      border-color: #136d75;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field input {
      min-height: 44px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #bbb;
    }
    .hidden { display: none; }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }
    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 14px;
      overflow: hidden;
    }
    .thumb {
      aspect-ratio: 3 / 4;
      display: grid;
      place-items: center;
      padding: 12px;
      background: #f4f4f4;
    }
    .thumb img {
      max-height: 100%;
      object-fit: contain;
    }
    .meta {
      padding: 12px;
      display: grid;
      gap: 6px;
      font-size: 14px;
    }
    .debug-line {
      font-size: 14px;
      color: #444;
      margin-bottom: 8px;
      word-break: break-all;
    }
    pre {
      background: #111;
      color: #d6f5d6;
      padding: 16px;
      border-radius: 12px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.5;
    }
    .status {
      color: #555;
      margin-bottom: 12px;
    }
    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>Pokemon 卡牌查詢 Debug 版</h1>
      <p>這版會直接把第一張卡的原始資料印在畫面上，方便確認圖片欄位有沒有回來。</p>

      <div class="modes">
        <button id="modeName" class="active" type="button">名稱搜尋</button>
        <button id="modeSetNum" type="button">set + 卡號</button>
      </div>

      <form id="searchForm">
        <div class="grid">
          <div class="field" id="fieldName">
            <label for="pokemonName">Pokemon 名稱</label>
            <input id="pokemonName" type="text" placeholder="例如 Pikachu / Charizard / Mew" />
          </div>

          <div class="field hidden" id="fieldSetId">
            <label for="setId">Set ID</label>
            <input id="setId" type="text" placeholder="例如 base1 / sv3 / swsh4" />
          </div>

          <div class="field hidden" id="fieldNumber">
            <label for="cardNumber">卡號</label>
            <input id="cardNumber" type="text" placeholder="例如 4 / 25 / 141" />
          </div>
        </div>

        <div class="actions" style="margin-top:14px;">
          <button class="primary" type="submit">開始搜尋</button>
          <button type="button" id="fillDemo">填入示例</button>
          <button type="button" id="clearBtn">清空</button>
        </div>
      </form>
    </div>

    <div class="panel">
      <h2>搜尋狀態</h2>
      <div class="status" id="status">尚未搜尋。</div>
      <div class="debug-line" id="debugImageLine"></div>
    </div>

    <div class="panel">
      <h2>第一張卡 Debug JSON</h2>
      <pre id="debugJson">尚未搜尋。</pre>
    </div>

    <div class="panel">
      <h2>搜尋結果</h2>
      <div id="resultsArea">搜尋結果會顯示在這裡。</div>
    </div>
  </div>

  <script>
    const apiBase = 'https://api.pokemontcg.io/v2/cards';

    const modeNameBtn = document.getElementById('modeName');
    const modeSetNumBtn = document.getElementById('modeSetNum');
    const fieldName = document.getElementById('fieldName');
    const fieldSetId = document.getElementById('fieldSetId');
    const fieldNumber = document.getElementById('fieldNumber');
    const pokemonName = document.getElementById('pokemonName');
    const setId = document.getElementById('setId');
    const cardNumber = document.getElementById('cardNumber');
    const searchForm = document.getElementById('searchForm');
    const fillDemo = document.getElementById('fillDemo');
    const clearBtn = document.getElementById('clearBtn');
    const statusEl = document.getElementById('status');
    const debugJson = document.getElementById('debugJson');
    const debugImageLine = document.getElementById('debugImageLine');
    const resultsArea = document.getElementById('resultsArea');

    let mode = 'name';

    function setMode(nextMode) {
      mode = nextMode;
      modeNameBtn.classList.toggle('active', nextMode === 'name');
      modeSetNumBtn.classList.toggle('active', nextMode === 'setnum');
      fieldName.classList.toggle('hidden', nextMode !== 'name');
      fieldSetId.classList.toggle('hidden', nextMode !== 'setnum');
      fieldNumber.classList.toggle('hidden', nextMode !== 'setnum');
    }

    function buildQuery() {
      if (mode === 'name') {
        const value = pokemonName.value.trim();
        if (!value) throw new Error('請輸入 Pokemon 名稱。');
        return `name:${value}`;
      }
      const s = setId.value.trim();
      const n = cardNumber.value.trim();
      if (!s || !n) throw new Error('請輸入 set id 與卡號。');
      return `set.id:${s} number:${n}`;
    }

    function buildImageUrl(card) {
      const sid = card?.set?.id || '';
      const num = card?.number || '';
      if (sid && num) {
        return `https://images.pokemontcg.io/${sid}/${num}.png`;
      }
      return '';
    }

    async function searchCards(query) {
      const url = new URL(apiBase);
      url.searchParams.set('q', query);
      url.searchParams.set('pageSize', '12');

      const response = await fetch(url.toString(), {
        headers: {
          'Accept': 'application/json'
        }
      });

      if (!response.ok) {
        throw new Error(`API 請求失敗：${response.status}`);
      }

      const payload = await response.json();
      return payload.data || [];
    }

    function renderCards(cards) {
      if (!cards.length) {
        resultsArea.innerHTML = '<p>找不到結果。</p>';
        return;
      }

      resultsArea.innerHTML = `
        <div class="cards">
          ${cards.map(card => {
            const primary = buildImageUrl(card);
            const fallback = card.images?.small || card.images?.large || '';
            const image = primary || fallback;
            return `
              <div class="card">
                <div class="thumb">
                  <img
                    src="${image}"
                    alt="${card.name || 'Pokemon'} 卡圖"
                    loading="lazy"
                    onerror="
                      if (this.dataset.fallbackTried !== '1' && '${fallback}') {
                        this.dataset.fallbackTried = '1';
                        this.src='${fallback}';
                      } else {
                        this.style.display='none';
                      }
                    "
                  >
                </div>
                <div class="meta">
                  <strong>${card.name || ''}</strong>
                  <div>number: ${card.number || ''}</div>
                  <div>set.id: ${card.set?.id || ''}</div>
                  <div>small: ${card.images?.small || ''}</div>
                  <div>large: ${card.images?.large || ''}</div>
                  <div>primary: ${primary}</div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    modeNameBtn.addEventListener('click', () => setMode('name'));
    modeSetNumBtn.addEventListener('click', () => setMode('setnum'));

    fillDemo.addEventListener('click', () => {
      if (mode === 'name') {
        pokemonName.value = 'Pikachu';
      } else {
        setId.value = 'base1';
        cardNumber.value = '4';
      }
    });

    clearBtn.addEventListener('click', () => {
      pokemonName.value = '';
      setId.value = '';
      cardNumber.value = '';
      statusEl.textContent = '已清空。';
      debugJson.textContent = '尚未搜尋。';
      debugImageLine.textContent = '';
      resultsArea.innerHTML = '搜尋結果會顯示在這裡。';
    });

    searchForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      try {
        const query = buildQuery();
        statusEl.textContent = '搜尋中...';
        debugJson.textContent = '載入中...';
        debugImageLine.textContent = '';
        resultsArea.innerHTML = '載入中...';

        const cards = await searchCards(query);

        statusEl.textContent = `共找到 ${cards.length} 張卡。`;
        renderCards(cards);

        if (cards.length > 0) {
          const first = cards[0];
          debugJson.textContent = JSON.stringify({
            id: first.id || '',
            name: first.name || '',
            number: first.number || '',
            setId: first.set?.id || '',
            setName: first.set?.name || '',
            small: first.images?.small || '',
            large: first.images?.large || '',
            primaryBuiltUrl: buildImageUrl(first),
            rawCard: first
          }, null, 2);

          const built = buildImageUrl(first);
          const fallback = first.images?.small || first.images?.large || '';
          debugImageLine.textContent = built
            ? `主圖片網址：${built}`
            : (fallback ? `Fallback 圖片網址：${fallback}` : '圖片網址：沒有取得');
        } else {
          debugJson.textContent = '沒有結果。';
        }
      } catch (error) {
        statusEl.textContent = '搜尋失敗';
        debugJson.textContent = String(error.message || error);
        resultsArea.innerHTML = '<p>搜尋失敗。</p>';
      }
    });
  </script>
</body>
</html>
