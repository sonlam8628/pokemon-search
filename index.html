<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon TCG 進階搜尋工作台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f8f9fa; color: #333; }
    .container { display: flex; height: 100vh; max-width: 1600px; margin: 0 auto; }
    .sidebar { width: 30%; border-right: 1px solid #eee; overflow-y: auto; padding: 20px; background: white; }
    .main { width: 40%; border-right: 1px solid #eee; overflow-y: auto; padding: 20px; background: #fafbfc; }
    .panel { width: 30%; padding: 20px; overflow-y: auto; background: white; }
    input, select, button { padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 6px; }
    button { background: #007bff; color: white; cursor: pointer; border: none; }
    button:hover { background: #0056b3; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
    .card-item { border: 1px solid #eee; border-radius: 8px; padding: 8px; cursor: pointer; text-align: center; }
    .card-item:hover { background: #f0f8ff; }
    .card-img { width: 100%; height: 80px; object-fit: cover; border-radius: 4px; }
    .card-detail { font-size: 14px; }
    .summary { background: #e9ecef; padding: 15px; border-radius: 8px; margin: 10px 0; white-space: pre-wrap; }
    .price-panel { margin: 10px 0; }
    .price-item { display: flex; justify-content: space-between; padding: 5px; }
    .external-links { margin-top: 20px; }
    .external-links button { width: 100%; margin: 5px 0; background: #28a745; }
    .loading { text-align: center; color: #666; }
    .empty { text-align: center; color: #999; font-style: italic; }
    @media (max-width: 1024px) { .container { flex-direction: column; } .sidebar, .main, .panel { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #eee; } }
  </style>
</head>
<body>
  <div class="container">
    <!-- 左側：搜尋與結果列表 -->
    <div class="sidebar">
      <h2>搜尋與篩選</h2>
      <input id="searchInput" placeholder="英文名稱或卡號 (e.g. Pikachu, SV-P 001)" style="width:100%;">
      <div>
        <label>類型: <select id="typeFilter"><option>所有</option><option>Pokémon</option><option>Trainer</option><option>Energy</option></select></label>
        <label>稀有度: <select id="rarityFilter"><option>所有</option><option>Common</option><option>Rare</option><option>Ultra Rare</option></select></label>
        <label>排序: <select id="sortFilter"><option>新至舊</option><option>舊至新</option><option>名稱 A-Z</option></select></label>
      </div>
      <button onclick="performSearch()">搜尋</button>
      <button onclick="loadMore()">載入更多</button>
      <div id="resultsList" class="card-grid"></div>
      <div id="status" class="loading"></div>
    </div>

    <!-- 中間：卡片詳情 -->
    <div class="main">
      <h2>卡片詳情</h2>
      <div id="detailContent" class="empty">請選擇一張卡片查看詳情</div>
    </div>

    <!-- 右側：摘要、匯出、連結 -->
    <div class="panel">
      <h2>摘要與匯出</h2>
      <div id="summary" class="summary">無摘要</div>
      <button onclick="copySummary()">複製摘要</button>
      <button onclick="exportTXT()">匯出 TXT</button>
      <button onclick="exportCSV()">匯出 CSV</button>
      <h3>價格面板 (模擬)</h3>
      <div id="pricePanel" class="price-panel">
        <div class="price-item"><span>SNKRDUNK</span><span>¥5,000</span></div>
        <div class="price-item"><span>eBay</span><span>$45</span></div>
        <div class="price-item"><span>SportsCardsPro</span><span>$50</span></div>
      </div>
      <div class="external-links">
        <h3>外部參考</h3>
        <button onclick="openExternal('snkrdunk')">SNKRDUNK 搜尋</button>
        <button onclick="openExternal('sportscardspro')">SportsCardsPro</button>
        <button onclick="openExternal('ebay')">eBay 搜尋</button>
        <button onclick="openExternal('tgcddex')">TCGdex 頁面</button>
      </div>
    </div>
  </div>

  <script>
    let allCards = []; // 全結果
    let currentCard = null;
    let nextPageUrl = '';
    let lang = 'zh'; // TCGdex 語言，改 'ja' 為日文
    const API_BASE = `https://api.tcgdex.net/v2/${lang}`;

    // 安全圖片URL
    function getCardImage(image) {
      if (!image) return 'https://via.placeholder.com/120x80?text=No+Image';
      const exts = ['low.webp', 'high.png', 'low.png', 'high.webp'];
      for (let ext of exts) {
        if (image.includes('.')) return image;
        return `${image.replace(/\/$/, '')}/${ext}`;
      }
      return image;
    }

    // 執行搜尋
    async function performSearch() {
      const q = document.getElementById('searchInput').value.trim();
      if (!q) return;
      document.getElementById('status').textContent = '搜尋中...';
      document.getElementById('resultsList').innerHTML = '';
      allCards = [];
      nextPageUrl = '';

      try {
        // TCGdex cards 搜尋
        let params = new URLSearchParams({
          name: q,
          pageSize: 40,
          orderBy: document.getElementById('sortFilter').value === '新至舊' ? 'releaseDate:desc' : 'releaseDate:asc'
        });
        let url = `${API_BASE}/cards?${params}`;
        const res = await fetch(url);
        const data = await res.json();
        allCards = data.data || [];
        applyFilters();
        renderResults();
        updateStatus(`找到 ${allCards.length} 張卡片`);
      } catch (e) {
        document.getElementById('status').textContent = '搜尋失敗';
      }
    }

    // 套用篩選
    function applyFilters() {
      const type = document.getElementById('typeFilter').value;
      const rarity = document.getElementById('rarityFilter').value;
      let filtered = allCards.filter(card => {
        return (!type || card.category === type) &&
               (!rarity || card.rarity?.includes(rarity));
      });
      allCards = filtered; // 更新顯示列表
    }

    // 渲染結果列表
    function renderResults() {
      const list = document.getElementById('resultsList');
      list.innerHTML = allCards.map(card => `
        <div class="card-item" onclick="selectCard(${JSON.stringify(card).replace(/"/g, '&quot;')})">
          <img src="${getCardImage(card.image?.small || card.image)}" class="card-img" alt="${card.name}">
          <div>${card.name}</div>
          <div class="card-detail">${card.localId || card.id}</div>
          <div>${card.rarity || 'N/A'}</div>
        </div>
      `).join('');
    }

    // 選擇卡片
    window.selectCard = function(card) {
      currentCard = card;
      const detail = document.getElementById('detailContent');
      const year = card.set?.releaseDate ? new Date(card.set.releaseDate).getFullYear() : 'N/A';
      detail.innerHTML = `
        <img src="${getCardImage(card.image)}" style="width:100%; max-height:300px; object-fit:cover;">
        <h3>${card.name} (${card.localId || card.id})</h3>
        <p><strong>年份:</strong> ${year}</p>
        <p><strong>類型:</strong> ${card.category || 'N/A'}</p>
        <p><strong>稀有度:</strong> ${card.rarity || 'N/A'}</p>
        <p><strong>插畫師:</strong> ${card.illustrator || 'N/A'}</p>
        <p><strong>描述:</strong> ${card.text || card.description || 'N/A'}</p>
        ${card.attacks ? `<p><strong>招式:</strong> ${JSON.stringify(card.attacks)}</p>` : ''}
      `;
      updateSummary();
      updatePrices();
    }

    // 更新摘要
    function updateSummary() {
      if (!currentCard) return;
      const summary = document.getElementById('summary');
      const text = `${currentCard.name} ${currentCard.localId || currentCard.id} | ${currentCard.rarity || ''} | ${currentCard.category || ''} | Illustrator: ${currentCard.illustrator || 'N/A'} | ${currentCard.set?.name || ''}`;
      summary.textContent = text;
    }

    // 價格模擬
    function updatePrices() {
      // 實際可接第三方API，此為模擬
      document.querySelectorAll('.price-item span:last-child').forEach((el, i) => {
        el.textContent = `$${Math.floor(Math.random() * 100) + 10}`;
      });
    }

    // 複製摘要
    function copySummary() {
      navigator.clipboard.writeText(document.getElementById('summary').textContent);
      alert('已複製！');
    }

    // 匯出 TXT
    function exportTXT() {
      const text = allCards.map(c => `${c.name} ${c.localId}`).join('\n');
      download('cards.txt', text);
    }

    // 匯出 CSV
    function exportCSV() {
      const csv = 'Name,ID,Rarity,Category\n' + allCards.map(c => `"${c.name}","${c.localId || c.id}","${c.rarity || ''}","${c.category || ''}"`).join('\n');
      download('cards.csv', csv);
    }

    // 下載
    function download(filename, content) {
      const blob = new Blob([content], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
    }

    // 外部連結
    function openExternal(site) {
      if (!currentCard) return alert('請先選擇卡片');
      const name = currentCard.name.replace(/ /g, '+');
      const links = {
        snkrdunk: `https://snkrdunk.com/en/search?q=${name}+pokemon+tcg`,
        sportscardspro: `https://www.sportscardspro.com/search?q=${name}`,
        ebay: `https://www.ebay.com/sch/i.html?_nkw=${name}+pokemon+tcg`,
        tgcddex: `https://tcgdex.net/${lang}/${currentCard.id}`
      };
      window.open(links[site], '_blank');
    }

    // 載入更多 (分頁)
    async function loadMore() {
      if (!nextPageUrl) return;
      try {
        const res = await fetch(nextPageUrl);
        const data = await res.json();
        allCards.push(...(data.data || []));
        applyFilters();
        renderResults();
      } catch (e) {}
    }

    // 初始化
    document.getElementById('searchInput').addEventListener('keypress', e => e.key === 'Enter' && performSearch());
    ['typeFilter', 'rarityFilter', 'sortFilter'].forEach(id => {
      document.getElementById(id).addEventListener('change', () => { applyFilters(); renderResults(); });
    });
  </script>
</body>
</html>
