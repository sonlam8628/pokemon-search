<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon TCG 穩定搜尋工作台 v2</title>
  <style>/* 同前版樣式，省略以節省空間 */</style>
</head>
<body>
  <!-- 同前版HTML結構，僅關鍵script變更 -->
  <script>
    // ... 前版變數與函數 ...

    // 修正搜尋 - 雙API穩定版
    async function performSearch() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      if (!q) return showStatus('請輸入名稱或卡號');
      
      showStatus('搜尋中... (檢查Console)');
      allCards = [];

      // 優先Pokémon TCG API (更穩)
      try {
        const ptcgUrl = `https://api.pokemontcg.io/v2/cards?q=(${q}* OR number:${q})&pageSize=40`;
        const pRes = await fetch(ptcgUrl);
        if (pRes.ok) {
          const pData = await pRes.json();
          allCards = pData.data.map(adaptPTCGCard); // 標準化格式
          if (allCards.length > 0) {
            showStatus(`PTCG找到 ${allCards.length}張`);
            applyFilters(); renderResults(); return;
          }
        }
      } catch(e) { console.warn('PTCG fail:', e); }

      // Fallback TCGdex JA
      try {
        const tcgUrl = `https://api.tcgdex.net/v2/ja/cards?name=${encodeURIComponent(q)}&pageSize=40`;
        const tRes = await fetch(tcgUrl);
        if (tRes.ok) {
          const tData = await tRes.json(); // 直接陣列！
          allCards = Array.isArray(tData) ? tData.map(adaptTCGCard) : tData.data || [];
          showStatus(`TCGdex JA找到 ${allCards.length}張`);
        }
      } catch(e) { console.error('TCGdex fail:', e); }

      if (allCards.length === 0) {
        showStatus('無結果，試試"Pikachu"或"001/165"');
        loadTestData(); // 強制測試資料
      } else {
        applyFilters(); renderResults();
      }
    }

    // 標準化PTCG卡片
    function adaptPTCGCard(card) {
      return {
        id: card.id, name: card.name, number: card.number, rarity: card.rarity,
        category: card.supertype, hp: card.hp, illustrator: card.artist,
        image: card.images?.small, set: { name: card.set.name, releaseDate: card.set.releaseDate },
        text: card.text || '', attacks: card.attacks
      };
    }

    // 標準化TCGdex
    function adaptTCGCard(card) {
      return {
        id: card.id, name: card.name, localId: card.localId, rarity: card.rarity,
        category: card.category, hp: card.hp, illustrator: card.illustrator,
        image: card.image, set: card.set, text: card.text || card.description,
        attacks: card.attacks
      };
    }

    // 測試資料按鈕
    function loadTestData() {
      allCards = [
        { name: 'ピカチュウ', localId: '001/102', rarity: 'Rare', image: 'https://assets.tcgdex.net/en/base1/jp1/58/low.webp', illustrator: 'Mitsuhiro Arita' },
        { name: 'Pikachu', number: '25/102', rarity: 'Rare Holo', image: 'https://images.pokemontcg.io/base1/58.png', illustrator: 'Mitsuhiro Arita' }
      ];
      applyFilters(); renderResults(); showStatus('已載入測試資料');
    }

    // 狀態顯示
    function showStatus(msg) {
      document.getElementById('status').textContent = msg;
      console.log('Status:', msg);
    }

    // 其他函數同前版 (render、selectCard等)，加入延遲避免rate limit
    // 在fetch加 await new Promise(r=>setTimeout(r,500));

    // 初始化 + 測試按鈕
    document.getElementById('searchInput').placeholder = '試"Pikachu"或點測試';
    // 加測試按鈕到sidebar: <button onclick="loadTestData()">測試資料</button>
  </script>
</body>
</html>
