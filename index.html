<!-- 搜尋輸入 -->
<input id="search" placeholder="英文名或卡號">
<!-- 篩選 -->
<select id="type"><!-- Pokémon,Trainer --></select>
<select id="rarity"><!-- Common,Rare --></select>
<select id="sort"><!-- name,releasedAt --></select>

<script>
async function searchCards(q) {
  const url = `https://api.tcgdex.net/v2/${lang}/cards?${new URLSearchParams({name: q, pageSize: 20, orderBy: document.getElementById('sort').value})}`;
  const res = await fetch(url);
  const data = await res.json();
  // 渲染左列表、中詳情
  displayResults(data.data);
}
</script>
