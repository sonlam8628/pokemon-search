<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pokemon-search-fixed</title>
  <meta name="description" content="修正版 Pokemon 日文卡牌搜尋，支援日文名稱與英文 Pokémon 名稱轉日文搜尋，並修正 TCGdex 圖片路徑。">
  <style>
    :root {
      --bg: #f7f6f2;
      --surface: #fffdf9;
      --surface-2: #f2eee8;
      --text: #28251d;
      --muted: #6f6a61;
      --border: #d4d1ca;
      --primary: #01696f;
      --primary-hover: #0c4e54;
      --shadow: 0 10px 30px rgba(0,0,0,0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #faf8f4, var(--bg));
      color: var(--text);
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    .wrap {
      width: min(1100px, calc(100% - 24px));
      margin: 0 auto;
      padding: 24px 0 48px;
    }

    .hero,
    .panel {
      background: rgba(255, 253, 249, 0.96);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 24px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.08;
    }

    .sub {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 760px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.7fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 14px;
      color: var(--muted);
      font-weight: 700;
    }

    input,
    select,
    button,
    a {
      font: inherit;
    }

    input,
    select {
      width: 100%;
      min-height: 48px;
      border-radius: 14px;
      border: 1px solid var(--border);
      padding: 12px 14px;
      background: #fff;
      color: var(--text);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn,
    .link-btn {
      min-height: 44px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: 10px 16px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .btn.primary:hover {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
    }

    .tips {
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .panel {
      padding: 22px;
    }

    .bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .bar h2 {
      margin: 0;
      font-size: 20px;
    }

    .status {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      max-width: 700px;
      word-break: break-word;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .thumb {
      background: linear-gradient(180deg, #eef6f6, #fff);
      padding: 14px;
      aspect-ratio: 3 / 4;
      display: grid;
      place-items: center;
    }

    .thumb img {
      max-height: 100%;
      object-fit: contain;
    }

    .fallback {
      width: 100%;
      height: 100%;
      border: 1px dashed var(--border);
      border-radius: 12px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 12px;
      background: #faf8f4;
      font-size: 14px;
    }

    .meta {
      padding: 14px;
      display: grid;
      gap: 8px;
    }

    .meta h3 {
      margin: 0;
      font-size: 17px;
      line-height: 1.3;
    }

    .small {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge {
      padding: 6px 10px;
      border-radius: 999px;
      background: #e8f1f3;
      font-size: 12px;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 2px;
    }

    .empty {
      border: 1px dashed var(--border);
      border-radius: 16px;
      padding: 28px;
      text-align: center;
      color: var(--muted);
      background: #fff;
      line-height: 1.7;
    }

    .footnote {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    @media (max-width: 820px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      .wrap {
        width: min(100% - 16px, 1100px);
      }
      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Pokemon 日文卡牌搜尋</h1>
      <p class="sub">
        修正版：支援日文名稱，或先把英文 Pokémon 名稱轉成日文後再搜尋，並修正 TCGdex 卡圖路徑與資料讀取方式。
      </p>

      <form id="searchForm">
        <div class="form-grid">
          <div class="field">
            <label for="keyword">輸入日文名稱 / 英文 Pokémon 名稱</label>
            <input id="keyword" type="text" placeholder="例如 ピカチュウ / Pikachu" autocomplete="off" />
          </div>

          <div class="field">
            <label for="sortMode">排列方式</label>
            <select id="sortMode">
              <option value="latest">新至舊</option>
              <option value="oldest">舊至新</option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button class="btn primary" type="submit">開始搜尋</button>
          <button class="btn" type="button" data-fill="ピカチュウ">ピカチュウ</button>
          <button class="btn" type="button" data-fill="Pikachu">Pikachu</button>
          <button class="btn" type="button" id="clearBtn">清空</button>
        </div>
      </form>

      <div class="tips">
        這版只保留最穩的名稱搜尋，不做卡號、PSA、modal，先確保 GitHub Pages 能正常顯示卡牌資料與圖片。
      </div>
    </section>

    <section class="panel">
      <div class="bar">
        <h2>搜尋結果</h2>
        <div class="status" id="status">尚未搜尋。</div>
      </div>

      <div id="resultsArea">
        <div class="empty">請輸入日文名稱或英文 Pokémon 名稱。</div>
      </div>

      <div class="footnote">
        TCGdex 資產文件說明卡圖 URL 需要補上格式與尺寸，例如 `low.webp` 或 `high.png`；cards 文件則提供卡片列表，因此這版改成先安全取資料，再補齊圖片路徑顯示。[web:404][web:403][web:44]
      </div>
    </section>
  </div>

  <script>
    const keywordInput = document.getElementById('keyword');
    const sortMode = document.getElementById('sortMode');
    const searchForm = document.getElementById('searchForm');
    const clearBtn = document.getElementById('clearBtn');
    const statusEl = document.getElementById('status');
    const resultsArea = document.getElementById('resultsArea');

    let currentCards = [];
    let currentEnglishName = '';
    let currentJapaneseName = '';

    function escapeHtml(str = '') {
      return String(str).replace(/[&<>'"]/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function normalizeText(value) {
      return String(value || '').trim().toLowerCase();
    }

    function isJapaneseText(text) {
      return /[\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff]/.test(text);
    }

    function getCardName(card) {
      if (typeof card.name === 'string') return card.name;
      if (card.name && typeof card.name === 'object') {
        return card.name.ja || card.name.en || Object.values(card.name)[0] || '';
      }
      return '';
    }

    function getCardImage(card) {
      let base = '';

      if (typeof card.image === 'string') {
        base = card.image;
      } else if (card.image && typeof card.image === 'object') {
        base = card.image.high || card.image.low || Object.values(card.image)[0] || '';
      }

      if (!base) return '';

      if (/\.(png|jpg|jpeg|webp)$/i.test(base)) {
        return base;
      }

      return `${base}/low.webp`;
    }

    function getReleaseYear(card) {
      const date = card.set?.releaseDate || card.releaseDate || '';
      return /^\d{4}-\d{2}-\d{2}$/.test(date) ? date.slice(0, 4) : '未標示';
    }

    function parseCardNumber(value) {
      const str = String(value || '');
      const m = str.match(/\d+/);
      return m ? Number(m[0]) : Number.MAX_SAFE_INTEGER;
    }

    function sortCards(cards, mode) {
      const copied = [...cards];

      if (mode === 'oldest') {
        copied.sort((a, b) => {
          const aDate = new Date(a.set?.releaseDate || a.releaseDate || '2999-12-31').getTime();
          const bDate = new Date(b.set?.releaseDate || b.releaseDate || '2999-12-31').getTime();
          if (aDate !== bDate) return aDate - bDate;
          return parseCardNumber(a.localId || a.id) - parseCardNumber(b.localId || b.id);
        });
        return copied;
      }

      copied.sort((a, b) => {
        const aDate = new Date(a.set?.releaseDate || a.releaseDate || '1900-01-01').getTime();
        const bDate = new Date(b.set?.releaseDate || b.releaseDate || '1900-01-01').getTime();
        if (bDate !== aDate) return bDate - aDate;
        return parseCardNumber(a.localId || a.id) - parseCardNumber(b.localId || b.id);
      });
      return copied;
    }

    async function safeJsonFetch(url) {
      const response = await fetch(url, {
        headers: { 'Accept': 'application/json' }
      });

      if (!response.ok) {
        throw new Error(`API 請求失敗：${response.status}`);
      }

      return await response.json();
    }

    async function resolveEnglishToJapaneseName(englishName) {
      const base = normalizeText(englishName);
      const url = `https://pokeapi.co/api/v2/pokemon-species/${encodeURIComponent(base)}`;
      const data = await safeJsonFetch(url);
      const names = data.names || [];
      const ja = names.find(item => item.language && (item.language.name === 'ja' || item.language.name === 'ja-Hrkt'));

      if (!ja || !ja.name) {
        throw new Error(`找不到 ${englishName} 的日文名稱`);
      }

      return ja.name;
    }

    async function fetchJapaneseCardsByName(japaneseName) {
      const url = new URL('https://api.tcgdex.net/v2/ja/cards');
      url.searchParams.set('name', japaneseName);

      const response = await fetch(url.toString(), {
        headers: { 'Accept': 'application/json' }
      });

      if (!response.ok) {
        throw new Error(`TCGdex 請求失敗：${response.status}`);
      }

      const data = await response.json();

      if (Array.isArray(data)) return data;
      if (Array.isArray(data.cards)) return data.cards;
      if (Array.isArray(data.data)) return data.data;

      return [];
    }

    function renderCards(cards) {
      currentCards = cards;

      if (!cards.length) {
        resultsArea.innerHTML = '<div class="empty">找不到日文卡片結果。請先試日文名稱，例如 ピカチュウ。</div>';
        return;
      }

      const html = cards.map(card => {
        const name = getCardName(card);
        const image = getCardImage(card);
        const cardNo = card.localId || card.id || '-';
        const setName = card.set?.name || card.set?.id || '未標示';
        const year = getReleaseYear(card);

        const snkrdunkQuery = encodeURIComponent([name, cardNo].filter(Boolean).join(' '));
        const ebayQuery = encodeURIComponent([currentEnglishName || name, cardNo, 'pokemon card'].filter(Boolean).join(' '));

        return `
          <article class="card">
            <div class="thumb">
              ${image ? `
                <img
                  src="${escapeHtml(image)}"
                  alt="${escapeHtml(name)} 卡圖"
                  loading="lazy"
                  width="245"
                  height="342"
                  onerror="this.style.display='none'; this.nextElementSibling.style.display='grid';"
                >
                <div class="fallback" style="display:none;">圖片暫時無法載入</div>
              ` : `
                <div class="fallback">沒有圖片資料</div>
              `}
            </div>

            <div class="meta">
              <h3>${escapeHtml(name || '未命名卡片')}</h3>

              <div class="badges">
                <span class="badge">${escapeHtml(cardNo)}</span>
                <span class="badge">${escapeHtml(card.rarity || '未標示')}</span>
              </div>

              <div class="small">系列：${escapeHtml(setName)}</div>
              <div class="small">推出年份：${escapeHtml(year)}</div>
              <div class="small">卡片種類：${escapeHtml(card.category || '未標示')}</div>

              <div class="links">
                <a class="link-btn" href="https://snkrdunk.com/en/search/result?keyword=${snkrdunkQuery}" target="_blank" rel="noopener noreferrer">SNKRDUNK</a>
                <a class="link-btn" href="https://www.ebay.com/sch/i.html?_nkw=${ebayQuery}" target="_blank" rel="noopener noreferrer">eBay</a>
              </div>
            </div>
          </article>
        `;
      }).join('');

      resultsArea.innerHTML = `<div class="cards">${html}</div>`;
    }

    async function runSearch() {
      const rawInput = keywordInput.value.trim();

      if (!rawInput) {
        statusEl.textContent = '請先輸入名稱。';
        resultsArea.innerHTML = '<div class="empty">請輸入日文名稱或英文 Pokémon 名稱。</div>';
        return;
      }

      resultsArea.innerHTML = '<div class="empty">正在查詢日文卡片資料...</div>';
      currentEnglishName = '';
      currentJapaneseName = '';

      try {
        let japaneseKeyword = rawInput;

        if (!isJapaneseText(rawInput)) {
          currentEnglishName = rawInput;
          currentJapaneseName = await resolveEnglishToJapaneseName(rawInput);
          japaneseKeyword = currentJapaneseName;
          statusEl.textContent = `英文：${rawInput} → 日文：${currentJapaneseName}，正在搜尋日文卡片...`;
        } else {
          currentJapaneseName = rawInput;
          statusEl.textContent = `正在搜尋日文卡片：${currentJapaneseName}`;
        }

        const cards = await fetchJapaneseCardsByName(japaneseKeyword);
        const sorted = sortCards(cards, sortMode.value);
        renderCards(sorted);

        if (currentEnglishName && currentJapaneseName) {
          statusEl.textContent = `英文：${currentEnglishName} → 日文：${currentJapaneseName}，目前顯示 ${sorted.length} 張日文卡片。`;
        } else {
          statusEl.textContent = `搜尋：${currentJapaneseName}，目前顯示 ${sorted.length} 張日文卡片。`;
        }
      } catch (error) {
        statusEl.textContent = '搜尋失敗';
        resultsArea.innerHTML = `
          <div class="empty">
            無法取得資料。<br>
            可能原因：輸入的英文名稱不是 Pokémon 本體名稱、API 暫時無回應，或目前資料庫沒有結果。<br>
            錯誤訊息：${escapeHtml(error.message || '未知錯誤')}
          </div>
        `;
      }
    }

    searchForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      await runSearch();
    });

    sortMode.addEventListener('change', () => {
      if (!currentCards.length) return;
      renderCards(sortCards(currentCards, sortMode.value));
      statusEl.textContent = `已重新排序，目前顯示 ${currentCards.length} 張日文卡片。`;
    });

    document.querySelectorAll('[data-fill]').forEach(button => {
      button.addEventListener('click', () => {
        keywordInput.value = button.dataset.fill || '';
      });
    });

    clearBtn.addEventListener('click', () => {
      keywordInput.value = '';
      sortMode.value = 'latest';
      currentCards = [];
      currentEnglishName = '';
      currentJapaneseName = '';
      statusEl.textContent = '已清空。';
      resultsArea.innerHTML = '<div class="empty">請輸入日文名稱或英文 Pokémon 名稱。</div>';
    });
  </script>
</body>
</html>
