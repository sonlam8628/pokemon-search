<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Any Card Name</title>
  <style>
    :root{--bg:#f6f7fb;--card:#fff;--line:#e5e7eb;--text:#111827;--muted:#6b7280;--pri:#2563eb}
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text)}
    .app{display:grid;grid-template-columns:320px 1fr;min-height:100vh}
    .col{background:var(--card);border-right:1px solid var(--line);overflow:auto;padding:16px}
    .col:last-child{border-right:none}
    h1,h2{margin:0 0 12px} h1{font-size:20px} h2{font-size:18px}
    input,select,button,textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font:inherit;background:#fff}
    button{background:var(--pri);color:#fff;border:none;cursor:pointer} button:hover{filter:brightness(.95)}
    .row{display:flex;gap:8px} .row>*{flex:1} .stack{display:flex;flex-direction:column;gap:8px}
    .box{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fff;margin-bottom:12px}
    .small{font-size:12px;color:var(--muted)} .sep{height:1px;background:var(--line);margin:12px 0}
    .list{display:flex;flex-direction:column;gap:8px}
    .item{border:1px solid var(--line);border-radius:14px;padding:10px;background:#fff;cursor:pointer}
    .item:hover{outline:2px solid #dbeafe}
    .name{font-weight:600}.sub{font-size:12px;color:var(--muted);margin-top:4px}
    textarea{min-height:260px;resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.5}
    .chips{display:flex;flex-wrap:wrap;gap:8px}.chip{padding:6px 10px;border:1px solid var(--line);border-radius:999px;background:#fff;font-size:12px;cursor:pointer}.chip.active{background:#dbeafe;border-color:#93c5fd;color:#1d4ed8}
    @media (max-width: 900px){.app{grid-template-columns:1fr}.col{border-right:none;border-bottom:1px solid var(--line)}}
  </style>
</head>
<body>
<div class="app">
  <section class="col left">
    <h1>Find Any Card Name</h1>
    <div class="small">先抓全卡庫，再本地搜尋任何名稱。</div>
    <div class="sep"></div>
    <div class="stack">
      <select id="lang">
        <option value="ja">日本語</option>
        <option value="en">English</option>
        <option value="all">全部語言</option>
      </select>
      <select id="source">
        <option value="tcgdex">TCGdex</option>
        <option value="ptcg">Pokémon TCG API</option>
      </select>
      <input id="q" placeholder="輸入任意字，例如 ピカ、chu、car、mew" />
      <div class="row">
        <button id="loadBtn">載入全卡</button>
        <button id="searchBtn">搜尋</button>
      </div>
      <div class="row">
        <button id="csvBtn">匯出 CSV</button>
        <button id="copyBtn">複製 CSV</button>
      </div>
      <div id="status" class="small">等待操作。</div>
      <div class="small">說明：這版優先抓全列表，不依賴單一名稱查詢。[web:2][web:61]</div>
    </div>
    <div class="sep"></div>
    <div class="box">
      <h2 style="font-size:16px">結果預覽</h2>
      <div id="list" class="list"></div>
    </div>
  </section>
  <section class="col right">
    <h2>CSV / 資料</h2>
    <div class="box">
      <textarea id="out" readonly></textarea>
    </div>
  </section>
</div>
<script>
const $=s=>document.getElementById(s)
const state={rows:[],filtered:[]}
function setStatus(t){$('status').textContent=t}
function esc(v){return String(v??'').replace(/[&<>\"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[m]))}
function csvEscape(v){return '"'+String(v??'').replace(/"/g,'""')+'"'}
function toCSV(rows){const head=['language','id','name','number','set','year','type','rarity','illustrator'];return [head.join(','),...rows.map(r=>head.map(k=>csvEscape(r[k])).join(','))].join('\n')}
function renderList(rows){$('list').innerHTML=rows.slice(0,60).map(r=>`<div class="item"><div class="name">${esc(r.name)}</div><div class="sub">${esc(r.number)} · ${esc(r.set)} · ${esc(r.language)}</div></div>`).join('')||'<div class="small">沒有結果</div>'}
function norm(s){return String(s||'').toLowerCase()}
function matchRow(r,q){const hay=[r.name,r.number,r.set,r.type,r.rarity,r.illustrator,r.id].join(' ').toLowerCase(); return hay.includes(q)}
async function fetchTCGdex(lang){const all=[]; let page=1; const per=250; while(true){const url=`https://api.tcgdex.net/v2/${lang}/cards?pagination[page]=${page}&pagination[itemsPerPage]=${per}`; const r=await fetch(url); const j=await r.json(); const arr=Array.isArray(j)?j:(Array.isArray(j.data)?j.data:[]); if(!arr.length) break; for(const c of arr){all.push({language:lang,id:c.id||'',name:c.name||'',number:c.number||c.localId||'',set:c.set?.name||'',year:(c.set?.releaseDate||'').slice(0,4),type:c.category||c.supertype||'',rarity:c.rarity||'',illustrator:c.illustrator||c.artist||''})} if(arr.length<per) break; page++; if(page>100) break} return all}
async function fetchPTCG(lang){const all=[]; let page=1; const per=250; while(true){let q='name:*'; const url=`https://api.pokemontcg.io/v2/cards?page=${page}&pageSize=${per}&q=${encodeURIComponent(q)}`; const r=await fetch(url); const j=await r.json(); const arr=Array.isArray(j.data)?j.data:[]; if(!arr.length) break; for(const c of arr){all.push({language:lang,id:c.id||'',name:c.name||'',number:c.number||'',set:c.set?.name||'',year:(c.set?.releaseDate||'').slice(0,4),type:c.supertype||'',rarity:c.rarity||'',illustrator:c.artist||''})} if(arr.length<per) break; page++; if(page>100) break} return all}
function dedupe(rows){const m=new Map(); for(const r of rows){const k=[r.language,r.id,r.name,r.number,r.set].join('|'); if(!m.has(k)) m.set(k,r)} return [...m.values()]}
async function loadAll(){setStatus('載入中...'); let rows=[]; const src=$('source').value; const lang=$('lang').value; try{if(src==='tcgdex'){if(lang==='all'){rows=[...(await fetchTCGdex('ja')),...(await fetchTCGdex('en'))]}else{rows=await fetchTCGdex(lang)}}else{if(lang==='all'){rows=[...(await fetchPTCG('ja')),...(await fetchPTCG('en'))]}else{rows=await fetchPTCG(lang)}} rows=dedupe(rows); state.rows=rows; state.filtered=rows; $('out').value=toCSV(rows); renderList(rows); setStatus(`載入完成：${rows.length} 張`)}catch(e){setStatus('載入失敗，請檢查 Console。')}}
function search(){const q=norm($('q').value.trim()); if(!q){state.filtered=state.rows; $('out').value=toCSV(state.rows); renderList(state.rows); setStatus(`顯示全部：${state.rows.length} 張`); return} const rows=state.rows.filter(r=>matchRow(r,q)); state.filtered=rows; $('out').value=toCSV(rows); renderList(rows); setStatus(`找到 ${rows.length} 張`) }
function csv(){const text=$('out').value||''; if(!text){setStatus('沒有 CSV 可匯出。'); return} const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([text],{type:'text/csv'})); a.download='cards.csv'; a.click()}
function copy(){navigator.clipboard.writeText($('out').value||'').then(()=>setStatus('已複製。'))}
$('loadBtn').onclick=loadAll; $('searchBtn').onclick=search; $('csvBtn').onclick=csv; $('copyBtn').onclick=copy; $('q').addEventListener('keydown',e=>{if(e.key==='Enter')search()})
setStatus('先按「載入全卡」。')
</script>
</body>
</html>
