<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokemon 日文卡牌查詢</title>
  <meta name="description" content="使用 TCGdex 查詢 Pokemon 日文卡牌，支援日文優先與英文備援。">
  <style>
    :root {
      --bg: #f6f3ee;
      --panel: #fffdf9;
      --line: #ddd5c9;
      --text: #26221d;
      --muted: #6a6358;
      --primary: #146b73;
      --primary-deep: #0e5358;
      --soft: #e6f1f2;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(255, 215, 120, 0.15), transparent 22%),
        linear-gradient(180deg, #f8f5ef, var(--bg));
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    .wrap {
      width: min(1150px, calc(100% - 24px));
      margin: 0 auto;
      padding: 24px 0 48px;
    }

    .hero,
    .results,
    .modal-card {
      background: rgba(255, 253, 249, 0.94);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .hero {
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.08;
    }

    .sub {
      margin: 0 0 18px;
      color: var(--muted);
      max-width: 760px;
      line-height: 1.6;
    }

    .filters,
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .filters {
      margin-bottom: 14px;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .chip-btn,
    .main-btn {
      min-height: 44px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 10px 16px;
      cursor: pointer;
      color: var(--text);
    }

    .chip-btn.active,
    .main-btn.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.7fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 14px;
      color: var(--muted);
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      min-height: 48px;
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 12px 14px;
      background: #fff;
      color: var(--text);
    }

    .results {
      border-radius: var(--radius);
      padding: 22px;
    }

    .bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .bar h2 {
      margin: 0;
      font-size: 20px;
    }

    .status {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .card-thumb {
      border: 0;
      background: linear-gradient(180deg, var(--soft), #fff);
      padding: 14px;
      aspect-ratio: 3 / 4;
      display: grid;
      place-items: center;
      cursor: pointer;
      width: 100%;
    }

    .card-thumb img {
      max-height: 100%;
      object-fit: contain;
    }

    .fallback {
      width: 100%;
      height: 100%;
      border: 1px dashed var(--line);
      border-radius: 12px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 12px;
      background: #faf8f4;
      font-size: 14px;
    }

    .meta {
      padding: 14px;
      display: grid;
      gap: 8px;
    }

    .meta h3 {
      margin: 0;
      font-size: 17px;
      line-height: 1.3;
    }

    .small {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge {
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--soft);
      font-size: 12px;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 16px;
      padding: 28px;
      text-align: center;
      color: var(--muted);
      background: #fff;
      line-height: 1.7;
    }

    .footnote {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 20;
    }

    .modal.open {
      display: flex;
    }

    .modal-card {
      width: min(920px, 100%);
      border-radius: 24px;
      padding: 18px;
      display: grid;
      grid-template-columns: minmax(240px, 330px) 1fr;
      gap: 18px;
      position: relative;
      background: #fffdf9;
    }

    .modal-card img {
      width: 100%;
      border-radius: 16px;
      background: linear-gradient(180deg, var(--soft), #fff);
      border: 1px solid var(--line);
      object-fit: contain;
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 0;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      cursor: pointer;
      font-size: 18px;
    }

    .detail {
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .detail h3 {
      margin: 0;
      font-size: 26px;
      line-height: 1.15;
    }

    .detail .line {
      color: var(--muted);
      line-height: 1.6;
      word-break: break-word;
    }

    @media (max-width: 860px) {
      .grid,
      .modal-card {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      .wrap {
        width: min(100% - 16px, 1150px);
      }
      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Pokemon 日文卡牌查詢</h1>
      <p class="sub">這版使用 TCGdex，多語系 Pokémon TCG API 先查日文 `ja-jp`，找不到再自動改查英文 `en`。適合以日文卡為主的搜尋需求。</p>

      <div class="filters">
        <button class="chip-btn active" type="button" id="langJa">日文優先</button>
        <button class="chip-btn" type="button" id="langEn">英文優先</button>
      </div>

      <form id="searchForm">
        <div class="grid">
          <div class="field">
            <label for="keyword">輸入 Pokemon 名稱</label>
            <input id="keyword" type="text" placeholder="例如 ピカチュウ / リザードン / Pikachu / Charizard" />
          </div>

          <div class="field">
            <label for="limit">顯示張數</label>
            <select id="limit">
              <option value="12">12</option>
              <option value="24" selected>24</option>
              <option value="36">36</option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button class="main-btn primary" type="submit">開始搜尋</button>
          <button class="main-btn" type="button" id="fillDemo">填入示例</button>
          <button class="main-btn" type="button" id="clearBtn">清空</button>
        </div>
      </form>
    </section>

    <section class="results">
      <div class="bar">
        <h2>搜尋結果</h2>
        <div class="status" id="status">尚未搜尋。</div>
      </div>

      <div id="resultsArea">
        <div class="empty">請輸入日文或英文 Pokemon 名稱，例如「ピカチュウ」或「Pikachu」。</div>
      </div>

      <div class="footnote">TCGdex 官方主打多語資料，包含日文支援；不同語言完整度可能略有差異，但整體方向比英文資料源更適合日文卡搜尋。[web:2][web:284]</div>
    </section>
  </div>

  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal-card">
      <button class="modal-close" id="modalClose" aria-label="關閉">✕</button>
      <img id="modalImg" src="" alt="Pokemon 卡牌大圖" />
      <div class="detail">
        <h3 id="modalTitle">卡片名稱</h3>
        <div class="line" id="modalSet"></div>
        <div class="line" id="modalNumber"></div>
        <div class="line" id="modalCategory"></div>
        <div class="line" id="modalIllustrator"></div>
        <div class="line" id="modalLanguage"></div>
      </div>
    </div>
  </div>

  <script>
    const keywordInput = document.getElementById('keyword');
    const limitSelect = document.getElementById('limit');
    const searchForm = document.getElementById('searchForm');
    const statusEl = document.getElementById('status');
    const resultsArea = document.getElementById('resultsArea');
    const fillDemo = document.getElementById('fillDemo');
    const clearBtn = document.getElementById('clearBtn');

    const langJa = document.getElementById('langJa');
    const langEn = document.getElementById('langEn');

    const modal = document.getElementById('modal');
    const modalClose = document.getElementById('modalClose');
    const modalImg = document.getElementById('modalImg');
    const modalTitle = document.getElementById('modalTitle');
    const modalSet = document.getElementById('modalSet');
    const modalNumber = document.getElementById('modalNumber');
    const modalCategory = document.getElementById('modalCategory');
    const modalIllustrator = document.getElementById('modalIllustrator');
    const modalLanguage = document.getElementById('modalLanguage');

    let preferredLanguage = 'ja-jp';
    let currentCards = [];

    function escapeHtml(str = '') {
      return String(str).replace(/[&<>'"]/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function setLanguage(lang) {
      preferredLanguage = lang;
      langJa.classList.toggle('active', lang === 'ja-jp');
      langEn.classList.toggle('active', lang === 'en');
    }

    function normalizeText(value) {
      return String(value || '').toLowerCase().trim();
    }

    function getCardName(card) {
      if (typeof card.name === 'string') return card.name;
      if (card.name && typeof card.name === 'object') {
        return card.name.ja || card.name.en || Object.values(card.name)[0] || '';
      }
      return '';
    }

    function getImage(card) {
      if (typeof card.image === 'string') return card.image;
      if (card.image && typeof card.image === 'object') {
        return card.image.high || card.image.low || Object.values(card.image)[0] || '';
      }
      return '';
    }

    function getCardId(card) {
      return card.id || card.localId || '';
    }

    async function fetchCards(language) {
      const url = `https://api.tcgdex.net/v2/${language}/cards`;
      const response = await fetch(url, {
        headers: { 'Accept': 'application/json' }
      });

      if (!response.ok) {
        throw new Error(`TCGdex 請求失敗：${response.status}`);
      }

      return await response.json();
    }

    async function searchCards(keyword, language, limit) {
      const allCards = await fetchCards(language);
      const q = normalizeText(keyword);

      const filtered = allCards.filter(card => {
        const name = normalizeText(getCardName(card));
        const id = normalizeText(getCardId(card));
        return name.includes(q) || id.includes(q);
      });

      return filtered.slice(0, limit);
    }

    function openModal(card, languageUsed) {
      const name = getCardName(card);
      const image = getImage(card);

      modalTitle.textContent = name || '未命名卡片';
      modalSet.textContent = `系列：${card.set?.name || card.set?.id || '未標示'}`;
      modalNumber.textContent = `卡號：${card.localId || card.id || '-'}`;
      modalCategory.textContent = `分類：${card.category || card.supertype || '未標示'}`;
      modalIllustrator.textContent = `插畫師：${card.illustrator || '未標示'}`;
      modalLanguage.textContent = `語言：${languageUsed}`;

      if (image) {
        modalImg.src = image;
      } else {
        modalImg.removeAttribute('src');
      }
      modalImg.alt = `${name || 'Pokemon'} 卡牌大圖`;

      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
    }

    function closeModal() {
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
      modalImg.removeAttribute('src');
    }

    function renderCards(cards, languageUsed, fallbackUsed) {
      currentCards = cards.map(card => ({ card, languageUsed }));

      if (!cards.length) {
        resultsArea.innerHTML = '<div class="empty">找不到結果。請試日文名稱、英文名稱，或確認拼寫。</div>';
        return;
      }

      resultsArea.innerHTML = `
        <div class="cards">
          ${cards.map((card, index) => {
            const image = getImage(card);
            const name = getCardName(card);
            const localId = card.localId || card.id || '-';
            const setName = card.set?.name || card.set?.id || '未標示';
            const category = card.category || card.supertype || '未標示';

            return `
              <article class="card">
                <button class="card-thumb" type="button" data-index="${index}" aria-label="開啟 ${escapeHtml(name)} 大圖">
                  ${image ? `
                    <img
                      src="${escapeHtml(image)}"
                      alt="${escapeHtml(name)} 卡圖"
                      loading="lazy"
                      width="245"
                      height="342"
                      onerror="this.style.display='none'; this.nextElementSibling.style.display='grid';"
                    >
                    <div class="fallback" style="display:none;">圖片暫時無法載入</div>
                  ` : `
                    <div class="fallback">沒有圖片資料</div>
                  `}
                </button>
                <div class="meta">
                  <h3>${escapeHtml(name || '未命名卡片')}</h3>
                  <div class="badges">
                    <span class="badge">${escapeHtml(localId)}</span>
                    <span class="badge">${escapeHtml(category)}</span>
                    <span class="badge">${escapeHtml(languageUsed)}</span>
                  </div>
                  <div class="small">${escapeHtml(setName)}</div>
                </div>
              </article>
            `;
          }).join('')}
        </div>
      `;

      document.querySelectorAll('[data-index]').forEach(button => {
        button.addEventListener('click', () => {
          const item = currentCards[Number(button.dataset.index)];
          if (item) openModal(item.card, item.languageUsed);
        });
      });

      statusEl.textContent = fallbackUsed
        ? `共找到 ${cards.length} 張卡片，已自動改用英文備援。`
        : `共找到 ${cards.length} 張卡片，資料語言：${languageUsed}`;
    }

    langJa.addEventListener('click', () => setLanguage('ja-jp'));
    langEn.addEventListener('click', () => setLanguage('en'));

    fillDemo.addEventListener('click', () => {
      keywordInput.value = preferredLanguage === 'ja-jp' ? 'ピカチュウ' : 'Pikachu';
    });

    clearBtn.addEventListener('click', () => {
      keywordInput.value = '';
      statusEl.textContent = '已清空。';
      resultsArea.innerHTML = '<div class="empty">請輸入日文或英文 Pokemon 名稱，例如「ピカチュウ」或「Pikachu」。</div>';
    });

    searchForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const keyword = keywordInput.value.trim();
      const limit = Number(limitSelect.value || '24');

      if (!keyword) {
        statusEl.textContent = '請先輸入名稱。';
        return;
      }

      try {
        statusEl.textContent = '搜尋中...';
        resultsArea.innerHTML = '<div class="empty">正在查詢卡片資料...</div>';

        let cards = await searchCards(keyword, preferredLanguage, limit);

        if (cards.length > 0) {
          renderCards(cards, preferredLanguage, false);
          return;
        }

        const fallbackLang = preferredLanguage === 'ja-jp' ? 'en' : 'ja-jp';
        cards = await searchCards(keyword, fallbackLang, limit);
        renderCards(cards, fallbackLang, true);
      } catch (error) {
        statusEl.textContent = '搜尋失敗';
        resultsArea.innerHTML = `<div class="empty">${escapeHtml(error.message || '發生未知錯誤。')}</div>`;
      }
    });

    modalClose.addEventListener('click', closeModal);
    modal.addEventListener('click', (event) => {
      if (event.target === modal) closeModal();
    });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>
