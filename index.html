<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pokemon-jp-card-number-search</title>
  <meta name="description" content="Pokemon 日文卡號搜尋專用超精簡版，只顯示卡圖、卡號與推出年份。">
  <style>
    :root {
      --bg: #f7f6f2;
      --surface: #fffdf9;
      --text: #28251d;
      --muted: #6f6a61;
      --border: #d4d1ca;
      --primary: #01696f;
      --primary-hover: #0c4e54;
      --shadow: 0 10px 30px rgba(0,0,0,0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #faf8f4, var(--bg));
      color: var(--text);
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    .wrap {
      width: min(760px, calc(100% - 24px));
      margin: 0 auto;
      padding: 24px 0 48px;
    }

    .hero,
    .panel {
      background: rgba(255, 253, 249, 0.96);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 24px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.08;
    }

    .sub {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 620px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    label {
      font-size: 14px;
      color: var(--muted);
      font-weight: 700;
    }

    input,
    button {
      font: inherit;
    }

    input {
      width: 100%;
      min-height: 48px;
      border-radius: 14px;
      border: 1px solid var(--border);
      padding: 12px 14px;
      background: #fff;
      color: var(--text);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      min-height: 44px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: 10px 16px;
      cursor: pointer;
    }

    .btn.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .btn.primary:hover {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
    }

    .tips {
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .panel {
      padding: 22px;
    }

    .bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .bar h2 {
      margin: 0;
      font-size: 20px;
    }

    .status {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      max-width: 620px;
      word-break: break-word;
    }

    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: grid;
      gap: 0;
    }

    .thumb {
      background: linear-gradient(180deg, #eef6f6, #fff);
      padding: 18px;
      aspect-ratio: 3 / 4;
      display: grid;
      place-items: center;
    }

    .thumb img {
      max-height: 100%;
      object-fit: contain;
    }

    .fallback {
      width: 100%;
      height: 100%;
      border: 1px dashed var(--border);
      border-radius: 12px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 12px;
      background: #faf8f4;
      font-size: 14px;
      line-height: 1.6;
    }

    .meta {
      padding: 18px;
      display: grid;
      gap: 10px;
      text-align: center;
    }

    .meta h3 {
      margin: 0;
      font-size: 20px;
      line-height: 1.3;
    }

    .pill {
      display: inline-block;
      margin: 0 auto;
      padding: 6px 12px;
      border-radius: 999px;
      background: #e8f1f3;
      font-size: 12px;
    }

    .year,
    .setline {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .empty {
      border: 1px dashed var(--border);
      border-radius: 16px;
      padding: 28px;
      text-align: center;
      color: var(--muted);
      background: #fff;
      line-height: 1.7;
    }

    .footnote {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>卡號搜尋專用</h1>
      <p class="sub">
        只支援卡號查詢，並只顯示卡圖、卡號、系列與推出年份。適合你只想快速確認日文版卡相片。
      </p>

      <form id="searchForm">
        <div class="field">
          <label for="keyword">輸入完整 card ID 或 set ID + localId</label>
          <input id="keyword" type="text" placeholder="例如 swsh3-136 或 s8a-P 004" autocomplete="off" />
        </div>

        <div class="actions">
          <button class="btn primary" type="submit">開始搜尋</button>
          <button class="btn" type="button" data-fill="swsh3-136">swsh3-136</button>
          <button class="btn" type="button" data-fill="s8a-P 004">s8a-P 004</button>
          <button class="btn" type="button" id="clearBtn">清空</button>
        </div>
      </form>

      <div class="tips">
        支援兩種格式：完整 card ID，或 set ID + localId。像 004/030 這種裸卡號不建議直接查。
      </div>
    </section>

    <section class="panel">
      <div class="bar">
        <h2>搜尋結果</h2>
        <div class="status" id="status">尚未搜尋。</div>
      </div>

      <div id="resultsArea">
        <div class="empty">請輸入卡號，例如 swsh3-136 或 s8a-P 004。</div>
      </div>

      <div class="footnote">
        TCGdex 提供「單一卡片」與「set ID + localId 取卡」兩種查詢路徑，所以這版直接用單卡查詢，不再依賴名稱搜尋。[page:2][page:1]
      </div>
    </section>
  </div>

  <script>
    const keywordInput = document.getElementById('keyword');
    const searchForm = document.getElementById('searchForm');
    const clearBtn = document.getElementById('clearBtn');
    const statusEl = document.getElementById('status');
    const resultsArea = document.getElementById('resultsArea');

    function escapeHtml(str = '') {
      return String(str).replace(/[&<>'"]/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function getCardName(card) {
      if (typeof card.name === 'string') return card.name;
      if (card.name && typeof card.name === 'object') {
        return card.name.ja || card.name.en || Object.values(card.name)[0] || '';
      }
      return '';
    }

    function getCardImageCandidates(card) {
      let base = '';

      if (typeof card.image === 'string') {
        base = card.image;
      } else if (card.image && typeof card.image === 'object') {
        base = card.image.high || card.image.low || Object.values(card.image)[0] || '';
      }

      if (!base) return [];
      if (/\.(png|jpg|jpeg|webp)$/i.test(base)) return [base];

      return [
        `${base}/low.webp`,
        `${base}/high.png`,
        `${base}/low.png`,
        `${base}/high.webp`
      ];
    }

    function getReleaseYear(card) {
      const date = card.set?.releaseDate || card.releaseDate || '';
      return /^\d{4}-\d{2}-\d{2}$/.test(date) ? date.slice(0, 4) : '未標示';
    }

    function parseInput(raw) {
      const text = String(raw || '').trim();

      if (!text) return null;

      if (/^[a-z0-9-]+$/i.test(text) && /\d/.test(text)) {
        return { type: 'card-id', cardId: text };
      }

      const match = text.match(/^([A-Za-z0-9-]+)\s+(.+)$/);
      if (match) {
        return {
          type: 'set-local',
          setId: match[1],
          localId: match[2].trim()
        };
      }

      return null;
    }

    async function safeJsonFetch(url) {
      const response = await fetch(url, {
        headers: { 'Accept': 'application/json' }
      });

      if (!response.ok) {
        if (response.status === 404) {
          throw new Error('找不到這張卡');
        }
        throw new Error(`API 請求失敗：${response.status}`);
      }

      return await response.json();
    }

    async function fetchByCardId(cardId) {
      const url = `https://api.tcgdex.net/v2/ja/cards/${encodeURIComponent(cardId)}`;
      return await safeJsonFetch(url);
    }

    async function fetchBySetLocal(setId, localId) {
      const url = `https://api.tcgdex.net/v2/ja/sets/${encodeURIComponent(setId)}/${encodeURIComponent(localId)}`;
      return await safeJsonFetch(url);
    }

    function renderCard(card, inputText) {
      if (!card || typeof card !== 'object') {
        resultsArea.innerHTML = '<div class="empty">找不到卡片資料。</div>';
        return;
      }

      const name = getCardName(card) || '未命名卡片';
      const images = getCardImageCandidates(card);
      const firstImage = images[0] || '';
      const remainingImages = escapeHtml(JSON.stringify(images.slice(1)));
      const year = getReleaseYear(card);
      const numberText = card.localId || card.id || '未標示';
      const setName = card.set?.name || card.set?.id || '未標示';

      resultsArea.innerHTML = `
        <article class="card">
          <div class="thumb">
            ${firstImage ? `
              <img
                src="${escapeHtml(firstImage)}"
                data-fallbacks='${remainingImages}'
                alt="${escapeHtml(name)} 卡圖"
                loading="lazy"
                width="320"
                height="448"
                onerror="
                  const fallbacks = JSON.parse(this.dataset.fallbacks || '[]');
                  if (fallbacks.length) {
                    this.src = fallbacks.shift();
                    this.dataset.fallbacks = JSON.stringify(fallbacks);
                  } else {
                    this.style.display='none';
                    this.nextElementSibling.style.display='grid';
                  }
                "
              >
              <div class="fallback" style="display:none;">沒有可用圖片</div>
            ` : `
              <div class="fallback">沒有圖片資料</div>
            `}
          </div>

          <div class="meta">
            <h3>${escapeHtml(name)}</h3>
            <div class="pill">${escapeHtml(numberText)}</div>
            <div class="setline">系列：${escapeHtml(setName)}</div>
            <div class="pill">${escapeHtml(year)} 年</div>
            <div class="year">輸入：${escapeHtml(inputText)}</div>
          </div>
        </article>
      `;
    }

    async function runSearch() {
      const rawInput = keywordInput.value.trim();

      if (!rawInput) {
        statusEl.textContent = '請先輸入卡號。';
        resultsArea.innerHTML = '<div class="empty">請輸入卡號，例如 swsh3-136 或 s8a-P 004。</div>';
        return;
      }

      const parsed = parseInput(rawInput);

      if (!parsed) {
        statusEl.textContent = '格式不正確';
        resultsArea.innerHTML = '<div class="empty">請輸入完整 card ID，或 set ID + localId，例如 s8a-P 004。</div>';
        return;
      }

      resultsArea.innerHTML = '<div class="empty">正在查詢卡片資料...</div>';

      try {
        let card;

        if (parsed.type === 'card-id') {
          statusEl.textContent = `正在以完整 card ID 查詢：${parsed.cardId}`;
          card = await fetchByCardId(parsed.cardId);
        } else {
          statusEl.textContent = `正在以 set + localId 查詢：${parsed.setId} ${parsed.localId}`;
          card = await fetchBySetLocal(parsed.setId, parsed.localId);
        }

        renderCard(card, rawInput);
        statusEl.textContent = `已找到卡片：${getCardName(card) || rawInput}`;
      } catch (error) {
        statusEl.textContent = '搜尋失敗';
        resultsArea.innerHTML = `
          <div class="empty">
            找不到卡片或無法取得資料。<br>
            錯誤訊息：${escapeHtml(error.message || '未知錯誤')}
          </div>
        `;
      }
    }

    searchForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      await runSearch();
    });

    document.querySelectorAll('[data-fill]').forEach(button => {
      button.addEventListener('click', () => {
        keywordInput.value = button.dataset.fill || '';
      });
    });

    clearBtn.addEventListener('click', () => {
      keywordInput.value = '';
      statusEl.textContent = '已清空。';
      resultsArea.innerHTML = '<div class="empty">請輸入卡號，例如 swsh3-136 或 s8a-P 004。</div>';
    });
  </script>
</body>
</html>
