<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pokemon-jp-text-minimal</title>
  <meta name="description" content="極簡 Pokemon 日文卡牌文字查詢介面，支援名稱或卡號搜尋、純文字整理、複製與 TXT 匯出。" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=general-sans@500,700&display=swap" rel="stylesheet">
  <style>
    :root,[data-theme="light"]{
      --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);
      --text-sm:clamp(.875rem,.8rem + .35vw,1rem);
      --text-base:clamp(1rem,.95rem + .25vw,1.125rem);
      --text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
      --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2rem);
      --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
      --color-bg:#f7f6f2;--color-surface:#fbfbf9;--color-surface-2:#f2efe9;--color-border:#d4d1ca;--color-divider:#dedbd4;
      --color-text:#28251d;--color-text-muted:#6f6a61;--color-text-faint:#9a9489;--color-text-inverse:#f9f8f4;
      --color-primary:#01696f;--color-primary-hover:#0c4e54;--color-primary-soft:#dfeceb;
      --radius-sm:.5rem;--radius-md:.9rem;--radius-lg:1.25rem;--radius-full:9999px;
      --shadow-sm:0 1px 2px rgba(0,0,0,.05);--shadow-md:0 12px 28px rgba(0,0,0,.08);
      --transition:180ms cubic-bezier(.16,1,.3,1);
      --font-body:"Satoshi","Inter",sans-serif;--font-display:"General Sans","Inter",sans-serif;
      --content:760px;
    }
    [data-theme="dark"]{
      --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#23211f;--color-border:#393836;--color-divider:#2a2826;
      --color-text:#e2ddd5;--color-text-muted:#b4aea4;--color-text-faint:#8b857c;--color-text-inverse:#171614;
      --color-primary:#4f98a3;--color-primary-hover:#227f8b;--color-primary-soft:#263638;
      --shadow-sm:0 1px 2px rgba(0,0,0,.25);--shadow-md:0 16px 32px rgba(0,0,0,.35);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-text-size-adjust:none;text-size-adjust:none;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
    body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);line-height:1.6;color:var(--color-text);background:var(--color-bg)}
    button,input,textarea{font:inherit;color:inherit}
    a,button,input,textarea{transition:background var(--transition),border-color var(--transition),color var(--transition),box-shadow var(--transition),transform var(--transition)}
    :focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm)}
    .wrap{width:min(calc(100% - 24px),var(--content));margin-inline:auto;padding:clamp(var(--space-6),5vw,var(--space-10)) 0}
    .shell{background:var(--color-surface);border:1px solid color-mix(in oklab,var(--color-text) 12%,transparent);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);overflow:hidden}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:var(--space-4);padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--color-divider)}
    .brand{display:flex;align-items:center;gap:var(--space-3)}
    .brand svg{width:28px;height:28px;color:var(--color-primary);flex:0 0 auto}
    .brand strong{display:block;font-family:var(--font-display);font-size:var(--text-sm);letter-spacing:.02em}
    .brand span{display:block;font-size:var(--text-xs);color:var(--color-text-muted)}
    .icon-btn,.btn{min-height:44px;border:1px solid color-mix(in oklab,var(--color-text) 12%,transparent);background:var(--color-surface);border-radius:var(--radius-full);padding:0 var(--space-4);display:inline-flex;align-items:center;justify-content:center;gap:var(--space-2);cursor:pointer;box-shadow:var(--shadow-sm);text-decoration:none}
    .btn.primary{background:var(--color-primary);border-color:var(--color-primary);color:var(--color-text-inverse)}
    .btn.primary:hover{background:var(--color-primary-hover);border-color:var(--color-primary-hover)}
    .icon-btn:hover,.btn:hover{transform:translateY(-1px)}
    .main{padding:clamp(var(--space-5),4vw,var(--space-8));display:grid;gap:var(--space-6)}
    .intro{display:grid;gap:var(--space-2)}
    .eyebrow{display:inline-flex;width:fit-content;padding:.4rem .7rem;border-radius:var(--radius-full);background:var(--color-primary-soft);color:var(--color-primary);font-size:var(--text-xs);font-weight:700}
    h1{font-family:var(--font-display);font-size:var(--text-xl);line-height:1.08;letter-spacing:-.03em;max-width:14ch}
    .intro p{color:var(--color-text-muted);max-width:62ch}
    .stack{display:grid;gap:var(--space-4)}
    .field{display:grid;gap:var(--space-2)}
    label{font-size:var(--text-sm);font-weight:700;color:var(--color-text-muted)}
    input,textarea{width:100%;border:1px solid color-mix(in oklab,var(--color-text) 12%,transparent);background:var(--color-surface);border-radius:var(--radius-md)}
    input{min-height:50px;padding:0 var(--space-4)}
    textarea{min-height:260px;padding:var(--space-4);resize:vertical;line-height:1.7}
    .actions{display:flex;flex-wrap:wrap;gap:var(--space-3)}
    .hint{font-size:var(--text-sm);color:var(--color-text-muted)}
    .panel{display:grid;gap:var(--space-4);padding:var(--space-4);border:1px solid color-mix(in oklab,var(--color-text) 10%,transparent);background:var(--color-surface-2);border-radius:var(--radius-md)}
    .status{font-size:var(--text-sm);color:var(--color-text-muted)}
    .result{white-space:pre-wrap;word-break:break-word;font-size:var(--text-sm);padding:var(--space-4);border-radius:var(--radius-md);background:var(--color-surface);border:1px solid color-mix(in oklab,var(--color-text) 10%,transparent);min-height:180px}
    .foot{font-size:var(--text-xs);color:var(--color-text-faint);line-height:1.7}
    .skip{position:absolute;left:var(--space-4);top:-100px;background:var(--color-primary);color:var(--color-text-inverse);padding:var(--space-3) var(--space-4);border-radius:var(--radius-full);text-decoration:none}
    .skip:focus{top:var(--space-4)}
    @media (max-width:560px){.wrap{width:min(calc(100% - 16px),var(--content))}.topbar,.main{padding-inline:var(--space-4)}.actions>*{flex:1 1 calc(50% - .5rem)}}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}
  </style>
</head>
<body>
  <a href="#main" class="skip">跳到內容</a>
  <div class="wrap">
    <section class="shell">
      <header class="topbar">
        <div class="brand" aria-label="JP card text lookup">
          <svg viewBox="0 0 64 64" fill="none" aria-hidden="true">
            <circle cx="32" cy="32" r="22" stroke="currentColor" stroke-width="4"></circle>
            <path d="M10 32H54" stroke="currentColor" stroke-width="4" stroke-linecap="round"></path>
            <circle cx="32" cy="32" r="7" fill="currentColor"></circle>
          </svg>
          <div>
            <strong>JP Card Text</strong>
            <span>極簡文字查詢</span>
          </div>
        </div>
        <button class="icon-btn" type="button" data-theme-toggle aria-label="切換主題">◐</button>
      </header>

      <main class="main" id="main">
        <section class="intro">
          <span class="eyebrow">Minimal UI</span>
          <h1>輸入卡名或卡號，只導出文字。</h1>
          <p>這版不顯示卡圖，只整理成可複製的文字結果，介面保持最少元素，適合先驗證查詢流程。</p>
        </section>

        <section class="stack">
          <div class="field">
            <label for="keyword">搜尋關鍵字</label>
            <input id="keyword" type="text" placeholder="例如 ピカチュウ / Pikachu / SV-P 001" autocomplete="off" />
          </div>

          <div class="actions">
            <button class="btn primary" id="searchBtn" type="button">搜尋</button>
            <button class="btn" type="button" data-fill="ピカチュウ">ピカチュウ</button>
            <button class="btn" type="button" data-fill="Pikachu">Pikachu</button>
            <button class="btn" type="button" data-fill="SV-P 001">SV-P 001</button>
            <button class="btn" id="copyBtn" type="button">複製文字</button>
            <button class="btn" id="downloadBtn" type="button">匯出 TXT</button>
            <button class="btn" id="clearBtn" type="button">清空</button>
          </div>

          <div class="hint">英文名會先嘗試轉成日文；結果只保留簡短文字欄位，方便閱讀與再加工。</div>
        </section>

        <section class="panel" aria-live="polite">
          <div class="status" id="status">尚未搜尋。</div>
          <div class="result" id="resultText">查詢結果會顯示在這裡。</div>
        </section>

        <p class="foot">建議資料來源用可程式化 API，不直接鏡像官方卡圖；純文字欄位網站通常更穩，也較容易匯出。</p>
      </main>
    </section>
  </div>

  <script>
    (function(){
      const btn=document.querySelector('[data-theme-toggle]');
      const root=document.documentElement;
      let theme=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
      root.setAttribute('data-theme',theme);
      btn?.addEventListener('click',()=>{
        theme=theme==='dark'?'light':'dark';
        root.setAttribute('data-theme',theme);
      });
    })();

    const keyword=document.getElementById('keyword');
    const resultText=document.getElementById('resultText');
    const statusEl=document.getElementById('status');
    const searchBtn=document.getElementById('searchBtn');
    const copyBtn=document.getElementById('copyBtn');
    const downloadBtn=document.getElementById('downloadBtn');
    const clearBtn=document.getElementById('clearBtn');

    function normalizeText(v){return String(v||'').trim().toLowerCase().replace(/\s+/g,' ')}
    function compactText(v){return normalizeText(v).replace(/[\s-]+/g,'')}
    function isJapaneseText(text){return /[\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff]/.test(text)}
    function looksLikeCardNumber(input){const v=String(input||'').trim();return /[0-9]/.test(v)&&(v.includes('/')||/^[A-Za-z]{1,8}[-\s]?[A-Za-z0-9]*\s?\d+$/i.test(v)||/^\d{1,3}$/.test(v))}
    function getCardName(card){if(typeof card.name==='string') return card.name; if(card.name&&typeof card.name==='object') return card.name.ja||card.name.en||Object.values(card.name)[0]||''; return ''}
    function getReleaseYear(card){const d=card.set?.releaseDate||card.releaseDate||''; return /^\d{4}/.test(d)?d.slice(0,4):'未標示'}
    function getCardTypeDetail(card){if(card.category==='Trainer') return card.trainerType?`Trainer / ${card.trainerType}`:'Trainer'; if(card.category==='Energy') return card.energyType?`Energy / ${card.energyType}`:'Energy'; return card.category||card.supertype||'未標示'}
    function dedupeCards(cards){const m=new Map(); for(const card of cards){const key=card.id||`${card.set?.id||''}-${card.localId||getCardName(card)}`; if(!m.has(key)) m.set(key,card)} return [...m.values()]}
    function matchCardNumber(card,query){const q=compactText(query); const localId=compactText(card.localId||''); const id=compactText(card.id||''); return localId.includes(q)||id.includes(q)}
    async function safeJsonFetch(url){const r=await fetch(url,{headers:{Accept:'application/json'}}); if(!r.ok) throw new Error(`API 請求失敗：${r.status}`); return await r.json()}

    async function resolveEnglishToJapaneseName(englishName){
      const base=normalizeText(englishName);
      try{
        const direct=await safeJsonFetch(`https://pokeapi.co/api/v2/pokemon-species/${encodeURIComponent(base)}`);
        const ja=(direct.names||[]).find(n=>n.language&&(n.language.name==='ja'||n.language.name==='ja-Hrkt'));
        if(ja?.name) return ja.name;
      }catch(e){}
      const list=await safeJsonFetch('https://pokeapi.co/api/v2/pokemon-species?limit=2000');
      const match=(list.results||[]).find(item=>normalizeText(item.name)===base);
      if(!match?.url) throw new Error(`找不到英文 Pokémon 名稱：${englishName}`);
      const species=await safeJsonFetch(match.url);
      const ja=(species.names||[]).find(n=>n.language&&(n.language.name==='ja'||n.language.name==='ja-Hrkt'));
      if(!ja?.name) throw new Error(`找不到 ${englishName} 的日文名稱`);
      return ja.name;
    }

    async function fetchJapaneseCardsByName(japaneseName){
      const url=new URL('https://api.tcgdex.net/v2/ja/cards');
      url.searchParams.set('name',japaneseName);
      url.searchParams.set('sort:field','releaseDate');
      url.searchParams.set('sort:order','DESC');
      url.searchParams.set('pagination:itemsPerPage','12');
      url.searchParams.set('pagination:offset','0');
      const data=await safeJsonFetch(url.toString());
      return Array.isArray(data)?data:(data.cards||data.data||[]);
    }

    async function searchByCardNumber(query){
      const pageSize=100, maxPages=6; let results=[];
      for(let i=0;i<maxPages;i++){
        statusEl.textContent=`正在掃描卡號：${query}（第 ${i+1} 批）`;
        const url=new URL('https://api.tcgdex.net/v2/ja/cards');
        url.searchParams.set('sort:field','releaseDate');
        url.searchParams.set('sort:order','DESC');
        url.searchParams.set('pagination:itemsPerPage',String(pageSize));
        url.searchParams.set('pagination:offset',String(i*pageSize));
        const data=await safeJsonFetch(url.toString());
        const page=Array.isArray(data)?data:(data.cards||data.data||[]);
        if(!page.length) break;
        results=results.concat(page.filter(card=>matchCardNumber(card,query)));
        if(page.length<pageSize) break;
      }
      return dedupeCards(results);
    }

    function formatCards(cards, raw, resolvedName=''){
      if(!cards.length) return '找不到結果。';
      return cards.map((card,index)=>{
        const lines=[
          `${index+1}. ${getCardName(card)||'未命名卡片'}`,
          `卡號：${card.localId||card.id||'-'}`,
          `系列：${card.set?.name||card.set?.id||'未標示'}`,
          `年份：${getReleaseYear(card)}`,
          `種類：${getCardTypeDetail(card)}`,
          `稀有度：${card.rarity||'未標示'}`,
          `插畫師：${card.illustrator||'未標示'}`,
          `ID：${card.id||'-'}`
        ];
        return lines.join('\n');
      }).join('\n\n────────\n\n') + (resolvedName?`\n\n搜尋轉換：${raw} → ${resolvedName}`:'');
    }

    async function runSearch(){
      const raw=keyword.value.trim();
      if(!raw){statusEl.textContent='請先輸入關鍵字。'; resultText.textContent='查詢結果會顯示在這裡。'; return;}
      resultText.textContent='查詢中...';
      try{
        let cards=[]; let resolved='';
        if(looksLikeCardNumber(raw)){
          cards=await searchByCardNumber(raw);
          statusEl.textContent=`卡號搜尋：${raw}，找到 ${cards.length} 張。`;
        }else if(isJapaneseText(raw)){
          cards=await fetchJapaneseCardsByName(raw);
          statusEl.textContent=`日文名稱搜尋：${raw}，找到 ${cards.length} 張。`;
        }else{
          resolved=await resolveEnglishToJapaneseName(raw);
          cards=await fetchJapaneseCardsByName(resolved);
          statusEl.textContent=`英文名稱：${raw} → 日文：${resolved}，找到 ${cards.length} 張。`;
        }
        resultText.textContent=formatCards(cards, raw, resolved);
      }catch(error){
        statusEl.textContent='搜尋失敗。';
        resultText.textContent=`錯誤：${error.message||'未知錯誤'}`;
      }
    }

    searchBtn.addEventListener('click',runSearch);
    keyword.addEventListener('keydown',e=>{if(e.key==='Enter') runSearch()});
    document.querySelectorAll('[data-fill]').forEach(btn=>btn.addEventListener('click',()=>{keyword.value=btn.dataset.fill||''}))
    copyBtn.addEventListener('click',async()=>{
      try{await navigator.clipboard.writeText(resultText.textContent||''); statusEl.textContent='已複製文字結果。';}
      catch(e){statusEl.textContent='無法複製，請手動選取文字。';}
    });
    downloadBtn.addEventListener('click',()=>{
      const blob=new Blob([resultText.textContent||''],{type:'text/plain;charset=utf-8'});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download='pokemon-jp-result.txt';
      a.click();
      URL.revokeObjectURL(a.href);
      statusEl.textContent='已匯出 TXT。';
    });
    clearBtn.addEventListener('click',()=>{
      keyword.value='';
      statusEl.textContent='已清空。';
      resultText.textContent='查詢結果會顯示在這裡。';
    });
  </script>
</body>
</html>
